name: Axiom Node Run

on:
  schedule:
    - cron: '0 */6 * * *' # Run every 6 hours
  workflow_dispatch:      # Allow manual runs

permissions:
  contents: write

jobs:
  run-node:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install UV
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Install Dependencies
        run: |
          uv lock
          uv sync

      - name: Run Axiom Node (5 Hour Session)
        run: |
          # Changed --db-name to docs/ledger.db so it sits next to index.html
          uv run axiom_server --db-name docs/ledger.db --limit-time 18000 --heartbeat-file docs/status.json
        env:
          GITHUB_ACTIONS: "true"

      - name: Commit and Push Updates
        run: |
          git config --global user.name "Axiom Cloud Node"
          git config --global user.email "axiom-node@users.noreply.github.com"
          
          git add -f docs/ledger.db docs/status.json uv.lock
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Axiom Ledger and Status [Cloud Run]"
            git push
          fi